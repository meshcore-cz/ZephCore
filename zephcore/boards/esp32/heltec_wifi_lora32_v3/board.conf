# Heltec WiFi LoRa 32 V3 — ESP32-S3 + SX1262
#
# Hardware:
#   ESP32-S3 (8MB flash, no PSRAM)
#   SX1262 on SPI2 (direct output, no PA)
#   SSD1306 128x64 OLED on I2C0
#   User button on GPIO0
#
# Include order: prj.conf → zephcore_common.conf → esp32_common.conf → board.conf

# Board identification
CONFIG_ZEPHCORE_BOARD_NAME="Heltec V3"
CONFIG_BT_DIS_MODEL_NUMBER_STR="Heltec WiFi LoRa 32 V3"

# Flash size — 8MB (override esp32_common.conf 4MB default)
CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y

# Companion transport over the board's CP2102 USB-UART bridge.
CONFIG_ZEPHCORE_COMPANION_USB=y
CONFIG_ZEPHCORE_COMPANION_UART=y

# Keep UART0 clean for MeshCore WebSerial binary frames.
CONFIG_UART_CONSOLE=n

# Diagnostic BLE mode: require the fixed MITM passkey but do not persist BLE
# bonds on this ESP32-S3 build. The macOS/Web Bluetooth trace reaches encrypted
# pairing, then the link times out before the first NUS RX write; avoiding bond
# storage tests whether the post-pair key/settings save is stalling the link.
CONFIG_BT_BONDABLE=n
CONFIG_BT_BONDING_REQUIRED=n
CONFIG_BT_SETTINGS=n
